services:
  postgres:
    image: postgres:16-alpine
    container_name: aeropath-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aeropath
      POSTGRES_PASSWORD: aeropath
      POSTGRES_DB: aeropath
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeropath -d aeropath"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
